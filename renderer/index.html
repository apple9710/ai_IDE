<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:; worker-src 'self' blob: data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; frame-src 'self' blob:; object-src 'self' blob:;"
    />
    <title>Claude IDE</title>
    <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Leftmost: activity bar (folder / terminal tab selector) -->
      <div id="activity-bar">
        <div class="brand" title="Claude IDE">✳</div>
        <button class="activity-btn active" id="btn-explorer" title="탐색기 (Ctrl+B)">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
        </button>
        <button class="activity-btn" id="btn-terminal" title="터미널 (Ctrl+`)">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm2.5 5.5L9 12l-2.5 2.5L8 16l4-4-4-4-1.5 1.5zM13 15h5v1.5h-5V15z"/></svg>
        </button>
        <button class="activity-btn active" id="btn-chat" title="Claude 채팅 (Ctrl+L)">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM7 9h10v2H7V9zm6 5H7v-2h6v2zm4-6H7V6h10v2z"/></svg>
        </button>
        <div class="spacer"></div>
      </div>

      <!-- Sidebar: folder tree -->
      <div id="sidebar">
        <div class="sidebar-header">
          <span id="sidebar-title">탐색기</span>
          <div class="sidebar-header-actions">
            <button id="btn-new-file" title="새 파일">
              <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-7-7zm-1 8V3.5L18.5 10H13a1 1 0 0 1-1-1z"/><path fill="currentColor" d="M12 12h1.5v2.5H16V16h-2.5v2.5H12V16H9.5v-1.5H12z"/></svg>
            </button>
            <button id="btn-new-folder" title="새 폴더">
              <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/><path fill="var(--bg-alt)" d="M12 11h1.3v1.7H15V14h-1.7v1.7H12V14h-1.7v-1.3H12z"/></svg>
            </button>
            <button id="btn-refresh" title="새로고침">
              <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M17.65 6.35A7.96 7.96 0 0 0 12 4a8 8 0 1 0 7.75 10h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
            <button id="btn-open-folder" title="폴더 열기">열기</button>
          </div>
        </div>
        <div id="git-bar" class="hidden">
          <span class="git-icon">⑂</span><span id="git-branch"></span>
        </div>
        <div id="file-tree"></div>
      </div>

      <!-- Right side: editor (center) + terminal (bottom) -->
      <div id="main-area">
        <!-- Project tabs: each tab is a whole project (folder + editor tabs +
             terminals + Claude session), switchable as a unit. -->
        <div id="project-bar">
          <div id="project-tabs"></div>
          <button id="btn-add-project" title="프로젝트(폴더) 추가">＋</button>
        </div>
        <div id="editor-region">
          <div id="tab-bar"></div>
          <div id="editor-container">
            <div id="welcome">
              <div class="welcome-logo">✳</div>
              <h1>Claude IDE</h1>
              <p>좌측 상단 <b>열기</b> 버튼으로 작업 폴더를 선택하세요.</p>
              <p>상단 <b>＋</b> 로 프로젝트를 여러 개 탭으로 열 수 있어요.</p>
            </div>
            <div id="monaco" style="display: none"></div>
            <!-- PDF / image viewer for non-text files -->
            <div id="binary-viewer" style="display: none"></div>
          </div>
        </div>

        <div id="panel-resizer"></div>

        <div id="terminal-panel">
          <div class="panel-header">
            <span>터미널</span>
            <div class="panel-actions">
              <button id="btn-new-term" title="새 터미널">＋</button>
              <button id="btn-hide-term" title="숨기기">▾</button>
            </div>
          </div>
          <div id="terminal-tabs"></div>
          <div id="terminal-host"></div>
        </div>
      </div>

      <!-- Right: Claude chat panel -->
      <div id="chat-resizer"></div>
      <div id="chat-panel">
        <div class="chat-header">
          <div class="chat-title">
            <span class="chat-star">✳</span>
            <span id="chat-engine-name">Claude</span>
            <span id="chat-model" class="chat-model"></span>
          </div>
          <div class="chat-header-actions">
            <button id="btn-chat-new" title="새 대화">＋ 새 대화</button>
          </div>
        </div>
        <!-- Engine tabs: which agent this panel is talking to -->
        <div class="chat-engines">
          <button id="engine-claude" class="engine-tab active">✳ Claude</button>
          <button id="engine-codex" class="engine-tab">◆ Codex</button>
        </div>
        <div class="chat-settings">
          <label class="cs-field" id="claude-model-field">
            <span>모델</span>
            <select id="chat-model-select">
              <option value="">기본값</option>
              <option value="opus">Opus 4.8</option>
              <option value="sonnet">Sonnet 5</option>
              <option value="haiku">Haiku 4.5</option>
              <option value="fable">Fable 5</option>
            </select>
          </label>
          <label class="cs-field hidden" id="codex-model-field">
            <span>모델</span>
            <select id="codex-model-select">
              <option value="">기본값</option>
              <option value="gpt-5.5">GPT-5.5</option>
              <option value="gpt-5.4">GPT-5.4</option>
              <option value="gpt-5.4-mini">GPT-5.4-Mini</option>
              <option value="gpt-5.3-codex-spark">GPT-5.3-Codex-Spark</option>
            </select>
          </label>
          <label class="cs-field">
            <span>추론</span>
            <select id="chat-effort-select">
              <option value="low">낮음</option>
              <option value="medium">보통</option>
              <option value="high">높음</option>
              <option value="xhigh">매우 높음</option>
              <option value="max">최대</option>
            </select>
          </label>
        </div>
        <!-- 협업 모드: Claude가 계획 → Codex 검토 → 합의 후 Claude가 실행 -->
        <div class="chat-settings collab-settings">
          <label class="cs-check" title="Claude가 계획을 세우고 Codex의 검토를 받아 합의한 뒤 실행합니다">
            <input type="checkbox" id="collab-toggle" />
            <span>협업 모드</span>
          </label>
          <label class="cs-field">
            <span>주도</span>
            <select id="collab-driver">
              <option value="claude">Claude</option>
              <option value="codex" disabled>Codex (추후 지원)</option>
            </select>
          </label>
          <label class="cs-field">
            <span>라운드</span>
            <select id="collab-rounds">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
            </select>
          </label>
          <label class="cs-check" title="각 전달을 승인해야 상대에게 넘어갑니다">
            <input type="checkbox" id="collab-manual" />
            <span>수동 릴레이</span>
          </label>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
          <div id="chat-status" class="hidden"></div>
          <div id="chat-warn" class="hidden"></div>
          <div id="chat-attachments" class="hidden"></div>
          <div class="chat-input-row">
            <button id="chat-attach" title="이미지 첨부 (붙여넣기·드래그도 가능)">
              <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M16.5 6.5v9.5a4.5 4.5 0 1 1-9 0V5.5a3 3 0 0 1 6 0v9.5a1.5 1.5 0 0 1-3 0V6.5H9v8.5a3 3 0 0 0 6 0V5.5a4.5 4.5 0 0 0-9 0V16a6 6 0 0 0 12 0V6.5h-1.5z"/></svg>
            </button>
            <input id="chat-file-input" type="file" accept="image/*" multiple hidden />
            <textarea
              id="chat-input"
              rows="1"
              placeholder="Claude에게 메시지 보내기…  (Enter 전송 · Shift+Enter 줄바꿈)"
            ></textarea>
            <button id="chat-send" title="전송">
              <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 20.5v-6l8-2.5-8-2.5v-6l19 8.5z"/></svg>
            </button>
            <button id="chat-stop" class="hidden" title="중단">■</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Context menu -->
    <div id="context-menu" class="hidden"></div>

    <!-- Floating popup shown when text is selected in the chat -->
    <div id="selection-pop" class="hidden">
      <button id="sel-copy">복사</button>
      <button id="sel-ask"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg> 이 부분 질문하기</button>
    </div>

    <!-- Generic input modal -->
    <div id="input-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <h2 id="input-modal-title">이름 입력</h2>
        <input id="input-modal-field" type="text" />
        <p id="input-modal-error" class="error-text"></p>
        <div class="modal-actions">
          <button id="input-modal-cancel">취소</button>
          <button id="input-modal-ok" class="primary">확인</button>
        </div>
      </div>
    </div>

    <!-- Confirm modal -->
    <div id="confirm-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <h2 id="confirm-modal-title">확인</h2>
        <p id="confirm-modal-msg"></p>
        <div class="modal-actions">
          <button id="confirm-modal-cancel">취소</button>
          <button id="confirm-modal-ok" class="danger">삭제</button>
        </div>
      </div>
    </div>

    <!-- xterm + fit addon (UMD) -->
    <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <!-- Monaco AMD loader -->
    <script src="../node_modules/monaco-editor/min/vs/loader.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
