<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e2895f"/>
      <stop offset="1" stop-color="#c25a37"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- warm rounded-square background -->
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- Claude-style sunburst spark -->
  <g stroke="#f7f2ea" stroke-linecap="round" fill="none" filter="url(#sh)">
    <g stroke-width="15">
      <line x1="128" y1="46"  x2="128" y2="210"/>
      <line x1="46"  y1="128" x2="210" y2="128"/>
    </g>
    <g stroke-width="13" transform="rotate(45 128 128)">
      <line x1="128" y1="64"  x2="128" y2="192"/>
      <line x1="64"  y1="128" x2="192" y2="128"/>
    </g>
    <g stroke-width="9" transform="rotate(22.5 128 128)">
      <line x1="128" y1="78"  x2="128" y2="178"/>
      <line x1="78"  y1="128" x2="178" y2="128"/>
    </g>
    <g stroke-width="9" transform="rotate(67.5 128 128)">
      <line x1="128" y1="78"  x2="128" y2="178"/>
      <line x1="78"  y1="128" x2="178" y2="128"/>
    </g>
  </g>
  <circle cx="128" cy="128" r="14" fill="#f7f2ea"/>
</svg>
